<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#050008;
overflow:hidden;
color:white;
}

.bg{
position:absolute;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(168,85,247,.25),transparent 30%),
radial-gradient(circle at 80% 70%,rgba(124,58,237,.18),transparent 30%),
#050008;
filter:blur(50px);
}

.card{
position:relative;
z-index:2;
width:420px;
padding:34px;
border-radius:30px;
background:#12051d;
border:1px solid rgba(255,255,255,.05);
}

h1{
font-size:44px;
margin-bottom:10px;
}

p{
opacity:.75;
margin-bottom:28px;
}

.input{
width:100%;
height:58px;
border:none;
outline:none;
background:#07000d;
border-radius:18px;
padding:0 18px;
color:white;
margin-bottom:18px;
}

.btn{
width:100%;
height:58px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#a855f7,#7c3aed);
color:white;
font-weight:900;
cursor:pointer;
font-size:16px;
}

.discord{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-top:12px;
height:54px;
border-radius:18px;
background:#5865f2;
color:white;
font-weight:900;
text-decoration:none;
}

.link{
margin-top:22px;
text-align:center;
opacity:.75;
}

.link a{
color:#a855f7;
text-decoration:none;
font-weight:700;
}
</style>
</head>

<body>

<div class="bg"></div>

<form class="card" method="POST" action="/login">

<h1>Entrar</h1>

<p>entre na sua conta usepurple</p>

<input
class="input"
type="text"
name="login"
placeholder="Usuário ou e-mail"
required>

<input
class="input"
type="password"
name="password"
placeholder="Senha"
required>

<button class="btn">
Entrar
</button>

<a class="discord" href="/auth/discord">
Entrar com Discord
</a>

<div class="link">
Não possui conta?
<a href="/register">
Criar Conta
</a>
</div>

</form>

</body>
</html>
