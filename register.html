<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta - usepurple</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#050008;
color:white;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(168,85,247,.25),transparent 30%),
radial-gradient(circle at 80% 70%,rgba(124,58,237,.18),transparent 30%),
#050008;
filter:blur(50px);
}

.card{
position:relative;
z-index:2;
width:430px;
padding:34px;
border-radius:30px;
background:#12051d;
border:1px solid rgba(255,255,255,.07);
}

h1{font-size:44px;margin-bottom:10px}
p{opacity:.75;margin-bottom:26px}

input{
width:100%;
height:58px;
border:none;
outline:none;
background:#07000d;
border-radius:18px;
padding:0 18px;
color:white;
margin-bottom:16px;
}

button{
width:100%;
height:58px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#a855f7,#7c3aed);
color:white;
font-weight:900;
cursor:pointer;
font-size:16px;
}

.link{
margin-top:20px;
text-align:center;
opacity:.8;
}

.link a{
color:#a855f7;
font-weight:800;
text-decoration:none;
}
</style>
</head>

<body>

<div class="bg"></div>

<form class="card" method="POST" action="/register">
<h1>Criar Conta</h1>
<p>Crie sua conta usepurple.</p>

<input type="text" name="username" placeholder="Usuário" required>
<input type="email" name="email" placeholder="E-mail" required>
<input type="password" name="password" placeholder="Senha" required>
<input type="password" name="confirmPassword" placeholder="Confirmar senha" required>

<button>Criar Conta</button>

<div class="link">
Já tem conta? <a href="/login">Entrar</a>
</div>
</form>

</body>
</html>
